# ~/.config/kitty/kitty.conf — managed by omakub
#
# theme.conf, font.conf, and font-size.conf are written by the omakub menu
# (Theme and Font pickers); edit this file for everything else.
# The keybindings replicate the zellij locked-by-default modal scheme that
# this setup replaced; known deltas from zellij are marked "DELTA:".

include theme.conf
include font.conf
include font-size.conf

#: Appearance ────────────────────────────────────────────────────────────

#: Pin emoji to the color emoji font — fontconfig's per-codepoint fallback
#: otherwise routes some (💰⏳) to fonts that render as dots. U+23F1/U+23F2
#: (⏱⏲) stay unmapped: they are text-presentation chars and the forced color
#: glyph is 1-cell, dark-on-dark, near-invisible — text fallback draws them in fg
symbol_map U+23F0,U+23F3,U+1F300-U+1F6FF,U+1F900-U+1F9FF,U+1FA70-U+1FAFF Noto Color Emoji

window_padding_width 14 16
hide_window_decorations yes
background_opacity 0.98
enable_audio_bell no
scrollback_lines 10000

#: zellij-style pane frames: every pane gets a title bar at the top showing
#: its cwd (filled by the omakub prompt's title escape), full borders with
#: gaps between panes. Border width is global — kitty has no per-focus width.
window_title_bar_min_windows 1
window_title_bar_align left
window_title_template " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.window}{progress_percent}{title}"
window_border_width 1pt
draw_minimal_borders no
window_margin_width 2

#: Tab bar (stand-in for zellij's compact bar): bottom edge like zellij;
#: tab_bar.py draws [MODE] + powerline tabs, colored from the active theme
tab_bar_min_tabs 1
tab_title_template "{index}: {title}"
tab_bar_edge bottom
tab_bar_style custom
tab_powerline_style slanted

#: splits = zellij-style tiling; stack is the fullscreen-zoom toggle target
enabled_layouts splits,stack

#: Scrollback: 'ctrl+g s e' edits it in nvim (plain text via launch, zellij
#: EditScrollback equivalent); 'ctrl+g s f' pages it with colors in less

#: Keyboard ──────────────────────────────────────────────────────────────
#: Start from zero, like zellij's clear-defaults=true
clear_all_shortcuts yes

#: Basics (alacritty parity)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map f11 toggle_fullscreen
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0
map ctrl+shift+f5 load_config_file
map ctrl+shift+n new_os_window

#: Always-on layer (zellij: shared_among "normal" "locked")
map alt+h kitten focus_or_tab.py left
map alt+l kitten focus_or_tab.py right
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+left kitten focus_or_tab.py left
map alt+right kitten focus_or_tab.py right
map alt+down neighboring_window down
map alt+up neighboring_window up
map alt+n launch --cwd=current --location=split
map alt+i move_tab_backward
map alt+o move_tab_forward
map alt+] next_layout
map alt+[ last_used_layout
#: DELTA: zellij Alt+± resized in all directions at once; kitty is per-axis
map alt+plus combine : resize_window taller : resize_window wider
map alt+equal combine : resize_window taller : resize_window wider
map alt+minus combine : resize_window shorter : resize_window narrower
#: DELTA: Alt+f (toggle floating panes) — kitty has no floating windows

#: Modal layer — ctrl+g unlocks, like zellij locked->normal.
#: The ctrl+alt+shift+fN triggers on submodes are syntax artifacts (a mode
#: needs a trigger); they are not meant to be typed. Enter submodes via
#: ctrl+g then p/t/r/s/m, leave with esc/enter.

map --new-mode nav --on-unknown ignore ctrl+g
map --mode nav ctrl+g pop_keyboard_mode
map --mode nav esc pop_keyboard_mode
map --mode nav enter pop_keyboard_mode
map --mode nav ctrl+q quit
map --mode nav p combine : pop_keyboard_mode : push_keyboard_mode pane
map --mode nav t combine : pop_keyboard_mode : push_keyboard_mode tab
map --mode nav r combine : pop_keyboard_mode : push_keyboard_mode resize
map --mode nav s combine : pop_keyboard_mode : push_keyboard_mode scroll
map --mode nav m combine : pop_keyboard_mode : push_keyboard_mode move
#: DELTA: 'o' session mode (detach, session-manager) — kitty has no sessions

#: pane mode (ctrl+g p) — h/j/k/l repeat; action keys drop back to locked
map --new-mode pane --on-unknown ignore ctrl+alt+shift+f1
map --mode pane esc pop_keyboard_mode
map --mode pane enter pop_keyboard_mode
map --mode pane p combine : pop_keyboard_mode : push_keyboard_mode nav
map --mode pane h neighboring_window left
map --mode pane j neighboring_window down
map --mode pane k neighboring_window up
map --mode pane l neighboring_window right
map --mode pane left neighboring_window left
map --mode pane down neighboring_window down
map --mode pane up neighboring_window up
map --mode pane right neighboring_window right
map --mode pane tab next_window
map --mode pane n combine : launch --cwd=current --location=split : pop_keyboard_mode
map --mode pane d combine : launch --cwd=current --location=hsplit : pop_keyboard_mode
map --mode pane r combine : launch --cwd=current --location=vsplit : pop_keyboard_mode
map --mode pane x combine : close_window : pop_keyboard_mode
map --mode pane f combine : toggle_layout stack : pop_keyboard_mode
map --mode pane c combine : set_window_title : pop_keyboard_mode
#: DELTA: w/e (floating panes) and z (pane frames) have no kitty equivalent

#: tab mode (ctrl+g t) — h/l repeat; action keys drop back to locked
map --new-mode tab --on-unknown ignore ctrl+alt+shift+f2
map --mode tab esc pop_keyboard_mode
map --mode tab enter pop_keyboard_mode
map --mode tab t combine : pop_keyboard_mode : push_keyboard_mode nav
map --mode tab h previous_tab
map --mode tab k previous_tab
map --mode tab left previous_tab
map --mode tab up previous_tab
map --mode tab l next_tab
map --mode tab j next_tab
map --mode tab right next_tab
map --mode tab down next_tab
map --mode tab 1 combine : goto_tab 1 : pop_keyboard_mode
map --mode tab 2 combine : goto_tab 2 : pop_keyboard_mode
map --mode tab 3 combine : goto_tab 3 : pop_keyboard_mode
map --mode tab 4 combine : goto_tab 4 : pop_keyboard_mode
map --mode tab 5 combine : goto_tab 5 : pop_keyboard_mode
map --mode tab 6 combine : goto_tab 6 : pop_keyboard_mode
map --mode tab 7 combine : goto_tab 7 : pop_keyboard_mode
map --mode tab 8 combine : goto_tab 8 : pop_keyboard_mode
map --mode tab 9 combine : goto_tab 9 : pop_keyboard_mode
map --mode tab n combine : new_tab : pop_keyboard_mode
map --mode tab x combine : close_tab : pop_keyboard_mode
map --mode tab r combine : set_tab_title : pop_keyboard_mode
map --mode tab b combine : detach_window new-tab : pop_keyboard_mode
map --mode tab [ combine : detach_window tab-left : pop_keyboard_mode
map --mode tab ] combine : detach_window tab-right : pop_keyboard_mode
map --mode tab tab goto_tab 0
#: DELTA: 's' (sync input to all panes) — use the broadcast kitten on demand

#: resize mode (ctrl+g r) — sticky, esc to leave
#: DELTA: kitty resizes per-axis (wider/narrower/taller/shorter), not per-edge
map --new-mode resize --on-unknown ignore ctrl+alt+shift+f3
map --mode resize esc pop_keyboard_mode
map --mode resize enter pop_keyboard_mode
map --mode resize r combine : pop_keyboard_mode : push_keyboard_mode nav
map --mode resize h resize_window narrower
map --mode resize l resize_window wider
map --mode resize k resize_window taller
map --mode resize j resize_window shorter
map --mode resize left resize_window narrower
map --mode resize right resize_window wider
map --mode resize up resize_window taller
map --mode resize down resize_window shorter
map --mode resize plus combine : resize_window taller : resize_window wider
map --mode resize equal combine : resize_window taller : resize_window wider
map --mode resize minus combine : resize_window shorter : resize_window narrower
map --mode resize 0 resize_window reset

#: scroll mode (ctrl+g s) — sticky, esc to leave
map --new-mode scroll --on-unknown ignore ctrl+alt+shift+f4
map --mode scroll esc pop_keyboard_mode
map --mode scroll enter pop_keyboard_mode
map --mode scroll s combine : pop_keyboard_mode : push_keyboard_mode nav
map --mode scroll j scroll_line_down
map --mode scroll k scroll_line_up
map --mode scroll down scroll_line_down
map --mode scroll up scroll_line_up
map --mode scroll d scroll_page_down
map --mode scroll u scroll_page_up
#: DELTA: d/u are full pages — kitty has no half-page scroll action
map --mode scroll ctrl+f scroll_page_down
map --mode scroll ctrl+b scroll_page_up
map --mode scroll h scroll_page_up
map --mode scroll l scroll_page_down
map --mode scroll left scroll_page_up
map --mode scroll right scroll_page_down
map --mode scroll page_down scroll_page_down
map --mode scroll page_up scroll_page_up
map --mode scroll ctrl+c combine : scroll_end : pop_keyboard_mode
map --mode scroll e combine : launch --stdin-source=@screen_scrollback --type=overlay nvim -c 'setlocal nonumber nolist laststatus=0' -c 'autocmd VimEnter * normal G' - : pop_keyboard_mode
#: DELTA: 'f' search — opens the pager too; search with / inside it
map --mode scroll f combine : show_scrollback : pop_keyboard_mode
map --mode scroll alt+h combine : kitten focus_or_tab.py left : pop_keyboard_mode
map --mode scroll alt+j combine : neighboring_window down : pop_keyboard_mode
map --mode scroll alt+k combine : neighboring_window up : pop_keyboard_mode
map --mode scroll alt+l combine : kitten focus_or_tab.py right : pop_keyboard_mode

#: move mode (ctrl+g m) — sticky, esc to leave
map --new-mode move --on-unknown ignore ctrl+alt+shift+f5
map --mode move esc pop_keyboard_mode
map --mode move enter pop_keyboard_mode
map --mode move m combine : pop_keyboard_mode : push_keyboard_mode nav
map --mode move h move_window left
map --mode move j move_window down
map --mode move k move_window up
map --mode move l move_window right
map --mode move left move_window left
map --mode move down move_window down
map --mode move up move_window up
map --mode move right move_window right
map --mode move n move_window_forward
map --mode move tab move_window_forward
map --mode move p move_window_backward
